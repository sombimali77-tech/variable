<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoreboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { display: flex; font-family: 'Cinzel Decorative', serif; }

        .header-text { position: absolute; top: 20px; width: 100%; text-align: center; font-size: clamp(3rem, 6vw, 7rem); color: #fff; font-weight: 900; text-shadow: 0 0 20px #000, 4px 4px 0 #333; z-index: 5; pointer-events: none; }

        .side { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; cursor: pointer; }
        .p1-side { background: linear-gradient(135deg, #4a0000 0%, #ff0000 100%); }
        .p2-side { background: linear-gradient(135deg, #000a4a 0%, #0000ff 100%); }

        .player-img { width: 250px; height: 250px; border-radius: 50%; object-fit: cover; border: 8px solid rgba(255,255,255,0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-top: 100px; margin-bottom: 20px; }
        .name { font-size: 3rem; color: #fff; text-shadow: 2px 2px 5px #000; }
        .score { font-family: 'Orbitron', sans-serif; font-size: 8rem; color: #fff; text-shadow: 0 0 20px #000; }

        .wheel-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 50; pointer-events: none; }
        #wheel { width: 400px; height: 400px; border-radius: 50%; border: 12px solid #fff; background: url('trophy.png') center/cover no-repeat; pointer-events: auto; cursor: pointer; position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        #wheel::after { content: ''; position: absolute; top: -60px; left: 160px; width: 0; height: 0; border-left: 40px solid transparent; border-right: 40px solid transparent; border-bottom: 80px solid #ffcc00; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5)); }

        .winner-banner { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .banner-content { background: #111; border: 6px solid #ffcc00; padding: 50px; border-radius: 30px; text-align: center; color: white; }
    </style>
</head>
<body>

    <div class="header-text" id="header-text">FIRST TO 50 WINS</div>

    <div class="side p1-side" onclick="updateScore('p1')">
        <img class="player-img" id="p1-img" src="" alt="Player 1">
        <div class="name" id="p1-name"></div>
        <div class="score" id="p1-score">0</div>
        <div class="winner-banner" id="p1-banner"><div class="banner-content"><h1>🏆 CHAMPION 🏆</h1></div></div>
    </div>

    <div class="wheel-container"><div id="wheel" onclick="spinWheel()"></div></div>

    <div class="side p2-side" onclick="updateScore('p2')">
        <img class="player-img" id="p2-img" src="" alt="Player 2">
        <div class="name" id="p2-name"></div>
        <div class="score" id="p2-score">0</div>
        <div class="winner-banner" id="p2-banner"><div class="banner-content"><h1>🏆 CHAMPION 🏆</h1></div></div>
    </div>

    <script>
        // ==========================================================
        // CONFIGURATION SECTION (Changing place)
        // ==========================================================
        const config = {
            player1Name: "YAMAL",           // Change Name
            player2Name: "MESSI",           // Change Name
            player1Image: "yamal_style.jpg",// Change Filename
            player2Image: "messi_style.jpg",// Change Filename
            winningScore: 40,               // Change Goal Score
            spinDuration: 30                // Change Spin Time (seconds)
        };
        // ==========================================================

        document.getElementById('p1-name').innerText = config.player1Name;
        document.getElementById('p2-name').innerText = config.player2Name;
        document.getElementById('p1-img').src = config.player1Image;
        document.getElementById('p2-img').src = config.player2Image;
        document.getElementById('header-text').innerText = `FIRST TO ${config.winningScore} WINS`;
        document.getElementById('wheel').style.transition = `transform ${config.spinDuration}s cubic-bezier(0.1, 0, 0, 1)`;

        let scores = { p1: 0, p2: 0 };
        let rotation = 0;

        function spinWheel() {
            rotation += 3600 + Math.floor(Math.random() * 360);
            document.getElementById('wheel').style.transform = `rotate(${rotation}deg)`;
        }

        function updateScore(player) {
            scores[player]++;
            document.getElementById(`${player}-score`).innerText = scores[player];
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(`${config.player1Name} ${scores.p1}, ${config.player2Name} ${scores.p2}`);
            const voices = window.speechSynthesis.getVoices();
            u.voice = voices.find(v => v.name.includes("Google US English") || v.name.includes("Samantha")) || voices[0];
            window.speechSynthesis.speak(u);

            if (scores[player] === config.winningScore) {
                document.getElementById(`${player}-banner`).style.display = 'flex';
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(`${(player==='p1'?config.player1Name:config.player2Name)} won the trophy!`));
            }
        }
    </script>
</body>
</html>
