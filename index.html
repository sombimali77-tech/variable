<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoreboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { display: flex; font-family: 'Cinzel Decorative', serif; }

        .header-text {
            position: absolute; top: 20px; width: 100%; text-align: center;
            font-size: clamp(3rem, 6vw, 7rem); color: #fff; font-weight: 900;
            text-transform: uppercase; text-shadow: 0 0 20px #000, 4px 4px 0 #333; z-index: 5;
        }

        .side {
            flex: 1; display: flex; flex-direction: column; justify-content: center;
            align-items: center; position: relative; cursor: pointer;
        }

        .player1-side { background: linear-gradient(135deg, #4a0000 0%, #ff0000 100%); }
        .player2-side { background: linear-gradient(135deg, #000a4a 0%, #0000ff 100%); }

        .player-img {
            width: 250px; height: 250px; border-radius: 50%; object-fit: cover;
            border: 8px solid rgba(255,255,255,0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 100px; margin-bottom: 20px;
        }

        .name { font-size: 3rem; color: #fff; text-shadow: 2px 2px 5px #000; }
        .score { font-family: 'Orbitron', sans-serif; font-size: 8rem; color: #fff; text-shadow: 0 0 20px #000; }

        .winner-banner {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
        .banner-content { background: #111; border: 6px solid #ffcc00; padding: 50px; border-radius: 30px; text-align: center; }
        
        .burst { 
            position: fixed; font-size: 5rem; z-index: 200; 
            animation: pop 0.8s ease-out forwards; pointer-events: none; 
        }
        @keyframes pop { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>

    <div class="header-text" id="header-text">FIRST TO 2 WINS</div>

    <div class="side player1-side" onclick="updateScore('p1')">
        <img class="player-img" id="p1-img" src="yamal_style.jpg" alt="Player 1">
        <div class="name" id="p1-name">Yamal</div>
        <div class="score" id="p1-score">0</div>
        <div class="winner-banner" id="p1-banner">
            <div class="banner-content"><h1>🏆 CHAMPION 🏆</h1><p id="p1-win-text">YAMAL GOT THE WINNER TROPHY!</p></div>
        </div>
    </div>

    <div class="side player2-side" onclick="updateScore('p2')">
        <img class="player-img" id="p2-img" src="messi_style.jpg" alt="Player 2">
        <div class="name" id="p2-name">Messi</div>
        <div class="score" id="p2-score">0</div>
        <div class="winner-banner" id="p2-banner">
            <div class="banner-content"><h1>🏆 CHAMPION 🏆</h1><p id="p2-win-text">MESSI GOT THE WINNER TROPHY!</p></div>
        </div>
    </div>

    <script>
        // ==========================================================
        // CONFIGURATION SECTION - CHANGE THESE VARIABLES ONLY
        // ==========================================================
        const config = {
            player1Name: "YAMAL",
            player2Name: "MESSI",
            player1Image: "yamal_style.jpg",
            player2Image: "messi_style.jpg",
            winningScore: 50
        };
        // ==========================================================

        // Apply config to UI
        document.getElementById('p1-name').innerText = config.player1Name;
        document.getElementById('p2-name').innerText = config.player2Name;
        document.getElementById('p1-img').src = config.player1Image;
        document.getElementById('p2-img').src = config.player2Image;
        document.getElementById('header-text').innerText = `FIRST TO ${config.winningScore} WINS`;
        document.getElementById('p1-win-text').innerText = `${config.player1Name.toUpperCase()} GOT THE WINNER TROPHY!`;
        document.getElementById('p2-win-text').innerText = `${config.player2Name.toUpperCase()} GOT THE WINNER TROPHY!`;

        let scores = { p1: 0, p2: 0 };
        let gameOver = false;
        let naturalVoice = null;

        function loadVoices() {
            const voices = window.speechSynthesis.getVoices();
            naturalVoice = voices.find(v => v.lang.startsWith('en') && (v.name.toLowerCase().includes('natural') || v.name.toLowerCase().includes('google'))) || voices.find(v => v.lang.startsWith('en'));
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        function updateScore(player) {
            if (gameOver) return;
            scores[player]++;
            document.getElementById(`${player}-score`).innerText = scores[player];
            
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(`${config.player1Name} ${scores.p1}, ${config.player2Name} ${scores.p2}`);
            if (naturalVoice) u.voice = naturalVoice;
            window.speechSynthesis.speak(u);

            if (scores[player] === config.winningScore) {
                gameOver = true;
                showWinner(player);
            }
        }

        function showWinner(player) {
            document.getElementById(`${player}-banner`).style.display = 'flex';
            
            for(let i=0; i<15; i++) {
                setTimeout(() => {
                    let b = document.createElement('div');
                    b.className = 'burst';
                    b.innerHTML = '🎈';
                    b.style.left = Math.random() * 80 + 10 + '%';
                    b.style.top = Math.random() * 80 + 10 + '%';
                    document.body.appendChild(b);
                    setTimeout(() => b.remove(), 800);
                }, i * 100);
            }

            const winnerName = (player === 'p1') ? config.player1Name : config.player2Name;
            const winU = new SpeechSynthesisUtterance(`${winnerName} got the winner trophy!`);
            if (naturalVoice) winU.voice = naturalVoice;
            window.speechSynthesis.speak(winU);
        }
    </script>
</body>
</html>
